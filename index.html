// ============== STORAGE HOOK ==============
function useStoredValue(key, defaultValue) {
  const [value, setValue] = useState(defaultValue);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get(key);
        if (!cancelled && r?.value !== undefined) {
          try { setValue(JSON.parse(r.value)); } catch { setValue(r.value); }
        }
      } catch {}
    })();
    return () => { cancelled = true; };
  }, [key]);
  const update = async (v) => { setValue(v); try { await window.storage.set(key, JSON.stringify(v)); } catch {} };
  return [value, update];
}

// ============== FETCH WITH FALLBACKS ==============
async function fetchWithFallback(url) {
  try {
    const r = await fetch(url, { mode: "cors" });
    if (r.ok) return await r.json();
  } catch {}
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy(url));
      if (r.ok) return await r.json();
    } catch {}
  }
  throw new Error("Network unavailable");
}

// ============== SCOREBOARD HOOK ==============
function useScoreboard() {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [source, setSource] = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  const pollRef = useRef(null);

  const fetchScoreboard = useCallback(async () => {
    try {
      const data = await fetchWithFallback(`${ESPN_BASE}/scoreboard?dates=${DATE_RANGE}&limit=200`);
      const parsed = (data.events || []).map(parseEvent).filter(Boolean);
      if (parsed.length === 0) throw new Error("Empty");
      setEvents(parsed);
      setSource("live");
      setLastFetch(new Date());
    } catch {
      setEvents(buildStaticEvents());
      setSource("static");
      setLastFetch(new Date());
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { fetchScoreboard(); }, [fetchScoreboard]);

  useEffect(() => {
    const anyLive = events.some(e => e.state === "in");
    if (anyLive && !pollRef.current && source === "live") {
      pollRef.current = setInterval(fetchScoreboard, POLL_INTERVAL);
    } else if (!anyLive && pollRef.current) {
      clearInterval(pollRef.current); pollRef.current = null;
    }
    return () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };
  }, [events, source, fetchScoreboard]);

  return { events, loading, source, lastFetch, refresh: fetchScoreboard };
}

function parseEvent(ev) {
  try {
    const comp = ev.competitions?.[0]; if (!comp) return null;
    const h = comp.competitors?.find(c => c.homeAway === "home") || comp.competitors?.[0];
    const a = comp.competitors?.find(c => c.homeAway === "away") || comp.competitors?.[1];
    if (!h || !a) return null;
    const status = comp.status?.type || {};
    const team = (c) => ({
      id: c.team?.id, name: c.team?.displayName,
      short: c.team?.shortDisplayName || c.team?.abbreviation,
      abbr: c.team?.abbreviation,
      logo: c.team?.logo || logoFor(c.team?.displayName),
      color: c.team?.color ? `#${c.team.color}` : TEAM_COLORS[c.team?.displayName],
      score: c.score, winner: c.winner, form: c.form,
    });
    return {
      id: ev.id, date: ev.date, state: status.state,
      statusDetail: status.shortDetail || status.detail,
      clock: comp.status?.displayClock, period: comp.status?.period,
      home: team(h), away: team(a),
      venue: comp.venue?.fullName, venueCity: comp.venue?.address?.city,
      broadcasts: (comp.broadcasts || []).flatMap(b => b.names || []),
      details: comp.details || [],
    };
  } catch { return null; }
}

// ============== MATCH SUMMARY ==============
function useMatchSummary(eventId) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!eventId || String(eventId).startsWith("static-")) return;
    let cancelled = false;
    setLoading(true);
    (async () => {
      try {
        const j = await fetchWithFallback(`${ESPN_BASE}/summary?event=${eventId}`);
        if (!cancelled) setData(j);
      } catch {} finally { if (!cancelled) setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [eventId]);
  return { data, loading };
}

// ============== ROSTER FETCH ==============
function useRoster(teamId) {
  const [roster, setRoster] = useState(null);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!teamId) return;
    let cancelled = false;
    setLoading(true);
    (async () => {
      try {
        const j = await fetchWithFallback(`${ESPN_BASE}/teams/${teamId}/roster`);
        if (cancelled) return;
        const athletes = j.athletes || j.team?.athletes || [];
        const flat = Array.isArray(athletes[0]?.items)
          ? athletes.flatMap(g => (g.items || []).map(p => ({ ...p, positionGroup: g.position })))
          : athletes;
        setRoster(flat);
      } catch { if (!cancelled) setRoster([]); }
      finally { if (!cancelled) setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [teamId]);
  return { roster, loading };
}

// ============== PLAYER STATS AGGREGATION ==============
// Computes goals/assists/cards for a player across all events
function usePlayerStats(playerId, events) {
  return useMemo(() => {
    const stats = { goals: 0, assists: 0, yellow: 0, red: 0, matchesScored: [] };
    if (!playerId) return stats;
    events.forEach(e => {
      (e.details || []).forEach(d => {
        const involved = (d.athletesInvolved || []).map(a => a.id);
        if (!involved.includes(playerId)) return;
        if (d.scoringPlay) {
          stats.goals++;
          stats.matchesScored.push({ eventId: e.id, clock: d.clock?.displayValue, vs: e.home.id === d.team?.id ? e.away.name : e.home.name });
        } else if (d.type?.text === "Assist" || d.type?.id === "93") {
          stats.assists++;
        } else if (d.type?.text?.includes("Yellow")) {
          stats.yellow++;
        } else if (d.type?.text?.includes("Red")) {
          stats.red++;
        }
      });
    });
    return stats;
  }, [playerId, events]);
}

// ============== ALERTS: detect new events for followed players ==============
function useAlerts(events, followedPlayers, alertsEnabled, browserNotify) {
  const [seen, setSeen] = useStoredValue("wc:seen-events", {});
  const [activeAlert, setActiveAlert] = useState(null);

  useEffect(() => {
    if (!alertsEnabled || !followedPlayers.length) return;
    const followedIds = new Set(followedPlayers.map(p => p.id));
    const newAlerts = [];
    const newSeen = { ...seen };

    events.forEach(e => {
      (e.details || []).forEach(d => {
        const involved = (d.athletesInvolved || []).map(a => a.id);
        const matchedId = involved.find(id => followedIds.has(id));
        if (!matchedId) return;
        const eventKey = `${e.id}-${d.clock?.displayValue || ""}-${d.type?.id || ""}-${matchedId}`;
        if (newSeen[eventKey]) return;
        newSeen[eventKey] = Date.now();
        const player = followedPlayers.find(p => p.id === matchedId);
        const athleteName = d.athletesInvolved?.find(a => a.id === matchedId)?.displayName || player.name;
        let type = "EVENT", emoji = "📋";
        if (d.scoringPlay) { type = "GOAL"; emoji = "⚽"; }
        else if (d.type?.text === "Assist") { type = "ASSIST"; emoji = "🎯"; }
        else if (d.type?.text?.includes("Yellow")) { type = "YELLOW CARD"; emoji = "🟨"; }
        else if (d.type?.text?.includes("Red")) { type = "RED CARD"; emoji = "🟥"; }
        else return; // skip unknown event types

        newAlerts.push({
          id: eventKey, type, emoji,
          player: athleteName, team: player.teamName,
          clock: d.clock?.displayValue || "",
          eventId: e.id,
          message: `${emoji} ${type}! ${athleteName} for ${player.teamName} (${d.clock?.displayValue || "—"})`
        });
      });
    });

    if (newAlerts.length > 0) {
      setSeen(newSeen);
      setActiveAlert(newAlerts[newAlerts.length - 1]);
      if (browserNotify && "Notification" in window && Notification.permission === "granted") {
        newAlerts.forEach(a => {
          try { new Notification("World Cup Alert", { body: a.message, icon: "⚽" }); } catch {}
        });
      }
    }
  }, [events, followedPlayers, alertsEnabled, browserNotify, seen, setSeen]);

  return { activeAlert, dismissAlert: () => setActiveAlert(null) };
}

const fmtTime = (iso) => new Date(iso).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
const fmtDateShort = (iso) => new Date(iso).toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
const ymd = (iso) => iso?.slice(0, 10);
function groupByDate(events) {
  const m = {};
  events.forEach(e => { (m[ymd(e.date)] = m[ymd(e.date)] || []).push(e); });
  return Object.entries(m).sort(([a], [b]) => a.localeCompare(b));
}

      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Anton', sans-serif", fontSize: size * 0.32, color: "#8B8478",
    }}>{(name || "?").slice(0, 3).toUpperCase()}</div>

  return <img src={logo} alt={name || ""} width={size} height={size} onError={() => setErr(true)}
    style={{ objectFit: "contain", filter: "drop-shadow(0 4px 8px rgba(0,0,0,0.5))" }} />;
}

function StatusBadge({ event, small }) {
  const { state, clock } = event;
  let color = "#16A34A", text = "UPCOMING";
  if (state === "in") { color = "#DC2626"; text = clock ? `LIVE ${clock}` : "LIVE"; }
  else if (state === "post") { color = "#9CA3AF"; text = "FT"; }
  return (
    <span style={{
      fontFamily: "'Anton', sans-serif", fontSize: small ? 9 : 10, letterSpacing: 2,
      color, padding: small ? "2px 5px" : "3px 7px",
      border: `1px solid ${color}`, borderRadius: 3,
      display: "inline-flex", alignItems: "center",
    }}>
      {state === "in" && <span style={{
        display: "inline-block", width: 6, height: 6, borderRadius: "50%",
        background: color, marginRight: 6, animation: "pulse 1.4s infinite",
      }} />}{text}
    </span>
  );
}

function GroupCard({ letter, events, favorite, onTeamTap }) {
  const teams = useMemo(() => {
    const t = {};
    (GROUP_MAP[letter] || []).forEach(n => {
      t[n] = { name: n, short: n, logo: logoFor(n), p: 0, w: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
    });
    events.forEach(e => {
      if (groupFor(e.home.name) !== letter) return;
      const h = t[e.home.name] || (t[e.home.name] = { name: e.home.name, short: e.home.short, logo: e.home.logo, p:0,w:0,gf:0,ga:0,gd:0,pts:0 });
      const a = t[e.away.name] || (t[e.away.name] = { name: e.away.name, short: e.away.short, logo: e.away.logo, p:0,w:0,gf:0,ga:0,gd:0,pts:0 });
      if (e.home.logo) h.logo = e.home.logo;
      if (e.away.logo) a.logo = e.away.logo;
      h.id = e.home.id || h.id; a.id = e.away.id || a.id;
      if (e.state === "post") {
        const hs = +e.home.score || 0, as = +e.away.score || 0;
        h.p++; a.p++; h.gf+=hs; h.ga+=as; a.gf+=as; a.ga+=hs;
        if (hs>as) { h.w++; h.pts+=3; } else if (hs<as) { a.w++; a.pts+=3; } else { h.pts++; a.pts++; }
        h.gd = h.gf-h.ga; a.gd = a.gf-a.ga;
      }
    });
    return Object.values(t).sort((x, y) => y.pts-x.pts || y.gd-x.gd || y.gf-x.gf);
  }, [letter, events]);

  return (
    <div style={{
      background: "linear-gradient(135deg, #FFFFFF 0%, #FAFAF7 100%)",
      borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid #E5DDD0",
    }}>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 12, paddingBottom: 10, borderBottom: "1px solid #E5DDD0" }}>
        <div style={{
          background: "linear-gradient(135deg, #DC2626, #991B1B)", width: 36, height: 36, borderRadius: 8,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "'Anton', sans-serif", fontSize: 24, color: "#FAF7F0", marginRight: 10,
          boxShadow: "0 4px 12px rgba(220,38,38,0.3)",
        }}>{letter}</div>
        <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 16, color: "#1A1814", letterSpacing: 2 }}>GROUP {letter}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "30px 1fr 26px 26px 32px 32px", gap: 6, fontSize: 9, color: "#A8A092", fontFamily: "'Inter', sans-serif", letterSpacing: 1, marginBottom: 6 }}>
        <div></div><div></div>
        <div style={{ textAlign: "center" }}>P</div><div style={{ textAlign: "center" }}>W</div>
        <div style={{ textAlign: "center" }}>GD</div><div style={{ textAlign: "center" }}>PTS</div>
      </div>
      {teams.map((t, i) => (
        <button key={t.name} onClick={() => onTeamTap(t)} style={{
          width: "100%", display: "grid", gridTemplateColumns: "30px 1fr 26px 26px 32px 32px",
          gap: 6, padding: "8px 0", border: "none", background: "transparent",
          cursor: "pointer", borderBottom: i < teams.length - 1 ? "1px solid #E5DDD088" : "none",
          alignItems: "center",
        }}>
          <TeamLogo logo={t.logo} name={t.short} size={22} />
          <span style={{
            fontFamily: "'Anton', sans-serif", fontSize: 13,
            color: favorite === t.name ? "#DC2626" : "#1A1814", letterSpacing: 0.5,
            textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>{(t.short || t.name).toUpperCase()}</span>
          <span style={{ textAlign: "center", fontFamily: "'Inter', sans-serif", fontSize: 11, color: "#6B6359" }}>{t.p}</span>
          <span style={{ textAlign: "center", fontFamily: "'Inter', sans-serif", fontSize: 11, color: "#6B6359" }}>{t.w}</span>
          <span style={{ textAlign: "center", fontFamily: "'Inter', sans-serif", fontSize: 11, color: "#6B6359" }}>{t.gd > 0 ? `+${t.gd}` : t.gd}</span>
          <span style={{ textAlign: "center", fontFamily: "'Anton', sans-serif", fontSize: 14, color: "#1A1814" }}>{t.pts}</span>
        </button>
      ))}
    </div>
  );
}

    return det.filter(d => d.scoringPlay).map(d => ({
      clock: d.clock?.displayValue || "",
      scorer: d.athletesInvolved?.[0]?.displayName || d.athletesInvolved?.[0]?.fullName || "Unknown",
      scorerId: d.athletesInvolved?.[0]?.id,
      teamId: d.team?.id,
    }));
  }, [summary, live]);

  const stats = useMemo(() => {
    try {
      const teams = summary?.boxscore?.teams;
      if (!teams || teams.length < 2) return null;
      const wanted = ["possessionPct", "totalShots", "shotsOnTarget", "wonCorners", "foulsCommitted", "yellowCards"];
      const labels = { possessionPct: "Possession", totalShots: "Shots", shotsOnTarget: "On Target", wonCorners: "Corners", foulsCommitted: "Fouls", yellowCards: "Yellow Cards" };
      const get = (t, k) => t.statistics?.find(s => s.name === k)?.displayValue ?? "—";
      return wanted.map(k => ({ label: labels[k], home: get(teams[0], k), away: get(teams[1], k), isPossession: k === "possessionPct" }))
        .filter(r => r.home !== "—" || r.away !== "—");
    } catch { return null; }
  }, [summary]);

  async function generatePreview() {
    setPreviewLoading(true); setPreviewError(""); setPreview("");
    try {
      const isPost = live.state === "post", isLive = live.state === "in";
      const scoreStr = (isPost || isLive) ? `Score: ${live.home.short} ${live.home.score}-${live.away.score} ${live.away.short}.` : "";
      const goalStr = goals.length ? `Goals: ${goals.map(g => `${g.scorer} (${g.clock})`).join("; ")}.` : "";
      const prompt = isPost
        ? `Write a sharp 100-word recap of this 2026 World Cup match: ${live.home.name} vs ${live.away.name}, Group ${groupFor(live.home.name)}, at ${live.venue}. ${scoreStr} ${goalStr} Cover the storyline, key moment, and what it means for the group. Plain prose, no headers.`
        : isLive
          ? `Write a brisk 90-word live update: ${live.home.name} vs ${live.away.name}, currently ${live.statusDetail}. ${scoreStr} ${goalStr} Describe the flow. Plain prose.`
          : `Write a punchy 110-word preview for ${live.home.name} vs ${live.away.name}, Group ${groupFor(live.home.name)}, at ${live.venue} on ${fmtDateShort(live.date)}. Form: ${live.home.short} ${live.home.form || "N/A"}, ${live.away.short} ${live.away.form || "N/A"}. One player to watch per side, tactical angle, prediction. Plain prose.`;
      let apiKey = localStorage.getItem("wc:anthropic-key");
      if (!apiKey) {
        apiKey = window.prompt("Paste your Anthropic API key (starts with sk-ant-...) to enable AI previews. Stored locally on your device only.");
        if (!apiKey) { setPreviewError("AI previews need an Anthropic API key."); setPreviewLoading(false); return; }
        localStorage.setItem("wc:anthropic-key", apiKey.trim());
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 500, messages: [{ role: "user", content: prompt }] }),
      });
      if (!res.ok) {
        if (res.status === 401) { localStorage.removeItem("wc:anthropic-key"); throw new Error("Invalid key"); }
        throw new Error("HTTP " + res.status);
      }
      const data = await res.json();
      const text = (data.content || []).map(b => b.text || "").filter(Boolean).join("\n").trim();
      if (!text) throw new Error("Empty");
      setPreview(text);
    } catch (e) { setPreviewError(e.message === "Invalid key" ? "Key rejected. Tap again to re-enter." : "Preview unavailable. Try again."); }
    finally { setPreviewLoading(false); }
  }

  const previewLabel = live.state === "post" ? "AI RECAP" : live.state === "in" ? "AI LIVE UPDATE" : "AI PREVIEW";

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)",
      display: "flex", alignItems: "flex-end", justifyContent: "center",
      zIndex: 100, backdropFilter: "blur(8px)",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#FFFFFF", width: "100%", maxWidth: 500,
        borderRadius: "20px 20px 0 0", padding: 24, maxHeight: "90vh", overflowY: "auto",
        border: "1px solid #E5DDD0", animation: "slideUp 0.3s ease-out",
      }}>
        <div style={{ width: 40, height: 4, background: "#E5DDD0", borderRadius: 2, margin: "0 auto 18px" }} />

        <div style={{ textAlign: "center", marginBottom: 14 }}>
          <StatusBadge event={live} />
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, color: "#A8A092", letterSpacing: 1.5, marginTop: 8 }}>
            GROUP {groupFor(live.home.name)} · {fmtDateShort(live.date)} · {fmtTime(live.date)}
          </div>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#8B8478", marginTop: 2 }}>
            {live.venue}{live.venueCity ? `, ${live.venueCity}` : ""}
          </div>
          {live.broadcasts?.length > 0 && (
            <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#A8A092", marginTop: 4, letterSpacing: 1 }}>
              📺 {live.broadcasts.join(" · ")}
            </div>
          )}
        </div>

        <div style={{
          display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center",
          padding: "20px 0", borderTop: "1px solid #E5DDD0", borderBottom: "1px solid #E5DDD0", marginBottom: 16,
        }}>
          <div style={{ textAlign: "center" }}>
            <TeamLogo logo={live.home.logo} name={live.home.short} size={56} />
            <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 14, color: "#1A1814", marginTop: 8, letterSpacing: 0.5 }}>
              {live.home.name?.toUpperCase()}
            </div>
            {live.home.form && (
              <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 9, color: "#A8A092", letterSpacing: 1, marginTop: 4 }}>
                FORM: {live.home.form}
              </div>
            )}
          </div>
          <div style={{ textAlign: "center", padding: "0 12px" }}>
            {live.state === "pre" ? (
              <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 26, color: "#DC2626", letterSpacing: 2 }}>VS</div>
            ) : (
              <>
                <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 42, color: "#1A1814", lineHeight: 1 }}>
                  {live.home.score} — {live.away.score}
                </div>
                {live.state === "in" && live.clock && (
                  <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, color: "#DC2626", marginTop: 4, letterSpacing: 1 }}>{live.clock}</div>
                )}
              </>
            )}
          </div>
          <div style={{ textAlign: "center" }}>
            <TeamLogo logo={live.away.logo} name={live.away.short} size={56} />
            <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 14, color: "#1A1814", marginTop: 8, letterSpacing: 0.5 }}>
              {live.away.name?.toUpperCase()}
            </div>
            {live.away.form && (
              <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 9, color: "#A8A092", letterSpacing: 1, marginTop: 4 }}>
                FORM: {live.away.form}
              </div>
            )}
          </div>
        </div>

        {goals.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <SectionLabel>⚽ GOALS</SectionLabel>
            {goals.map((g, i) => {
              const isHome = g.teamId === live.home.id;
              return (
                <div key={i} style={{
                  display: "flex", justifyContent: isHome ? "flex-start" : "flex-end",
                  alignItems: "center", padding: "6px 0", gap: 8,
                }}>
                  {isHome && <TeamLogo logo={live.home.logo} size={16} />}
                  <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#1A1814DD" }}>
                    {g.scorer} <span style={{ color: "#A8A092" }}>{g.clock}</span>
                  </span>
                  {!isHome && <TeamLogo logo={live.away.logo} size={16} />}
                </div>
              );
            })}
          </div>
        )}

        {stats && stats.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <SectionLabel>MATCH STATS</SectionLabel>
            {stats.map((s, i) => {
              const hN = parseFloat(String(s.home).replace("%", "")) || 0;
              const aN = parseFloat(String(s.away).replace("%", "")) || 0;
              const tot = hN + aN || 1;
              const hP = s.isPossession ? hN : (hN / tot) * 100;
              const aP = s.isPossession ? aN : (aN / tot) * 100;
              return (
                <div key={i} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontFamily: "'Anton', sans-serif", fontSize: 13, color: "#1A1814" }}>{s.home}</span>
                    <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#A8A092", letterSpacing: 1 }}>{s.label.toUpperCase()}</span>
                    <span style={{ fontFamily: "'Anton', sans-serif", fontSize: 13, color: "#1A1814" }}>{s.away}</span>
                  </div>
                  <div style={{ display: "flex", height: 4, borderRadius: 2, overflow: "hidden", background: "#E5DDD0" }}>
                    <div style={{ width: `${hP}%`, background: "#DC2626" }} />
                    <div style={{ width: `${aP}%`, background: "#16A34A", marginLeft: "auto" }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {summaryLoading && (
          <div style={{ textAlign: "center", padding: 8, color: "#A8A092", fontFamily: "'Inter', sans-serif", fontSize: 11 }}>
            Loading match data…
          </div>
        )}

        <SectionLabel style={{ marginTop: 8 }}>AI BREAKDOWN</SectionLabel>
        {!preview && !previewLoading && (
          <button onClick={generatePreview} style={{
            width: "100%", background: "linear-gradient(135deg, #DC2626 0%, #991B1B 100%)",
            color: "#FAF7F0", border: "none", padding: "14px", borderRadius: 8,
            fontFamily: "'Anton', sans-serif", fontSize: 13, letterSpacing: 2,
            cursor: "pointer", boxShadow: "0 4px 16px rgba(220,38,38,0.3)",
          }}>⚡ GENERATE {previewLabel}</button>
        )}
        {previewLoading && (
          <div style={{ textAlign: "center", padding: 20, color: "#6B6359", fontFamily: "'Inter', sans-serif", fontSize: 12 }}>
            Generating…
          </div>
        )}
        {previewError && (
          <div style={{ color: "#DC2626", fontFamily: "'Inter', sans-serif", fontSize: 11, textAlign: "center", padding: 10 }}>
            {previewError}
          </div>
        )}
        {preview && (
          <div style={{
            background: "#FFFFFF", border: "1px solid #E5DDD0", borderRadius: 10,
            padding: 14, fontFamily: "'Inter', sans-serif", fontSize: 13,
            lineHeight: 1.6, color: "#1A1814DD", whiteSpace: "pre-wrap",
          }}>{preview}</div>
        )}

        <button onClick={onClose} style={{
          width: "100%", background: "transparent", color: "#8B8478",
          border: "1px solid #E5DDD0", padding: "12px", borderRadius: 8,
          fontFamily: "'Anton', sans-serif", fontSize: 12, letterSpacing: 2,
          cursor: "pointer", marginTop: 16,
        }}>CLOSE</button>
      </div>
    </div>
  );
}

// ============== ALERT BANNER ==============
function AlertBanner({ alert, onDismiss, onTap }) {
  useEffect(() => {
    if (!alert) return;
    const t = setTimeout(onDismiss, 6000);
    return () => clearTimeout(t);
  }, [alert, onDismiss]);
  if (!alert) return null;

  return (
    <div style={{
      position: "fixed", top: 16, left: 16, right: 16, zIndex: 200,
      background: "linear-gradient(135deg, #DC2626 0%, #991B1B 100%)",
      borderRadius: 12, padding: "14px 16px",
      boxShadow: "0 12px 40px rgba(220,38,38,0.5)",
      animation: "slideDown 0.4s ease-out",
      cursor: "pointer",
    }} onClick={onTap}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ fontSize: 28 }}>{alert.emoji}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 14, color: "#FAF7F0", letterSpacing: 1.5 }}>
            {alert.type}!
          </div>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#FAF7F0DD", marginTop: 2 }}>
            {alert.player} · {alert.team} {alert.clock && `· ${alert.clock}`}
          </div>
        </div>
        <button onClick={(e) => { e.stopPropagation(); onDismiss(); }} style={{
          background: "rgba(0,0,0,0.3)", border: "none", color: "#FAF7F0",
          width: 24, height: 24, borderRadius: "50%", cursor: "pointer", fontSize: 12,
        }}>✕</button>
      </div>
    </div>
  );
}

  const recent = useMemo(() => events.filter(e => e.state === "post").sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5), [events]);

                        🔔 IN-APP ALERTS
                      </div>
                      <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#A8A092", marginTop: 2 }}>
                        Get a banner when your players score
                      </div>
                    </div>
                    <Toggle on={alertsEnabled} onChange={() => setAlertsEnabled(!alertsEnabled)} />
                  </div>
                  <div style={{ height: 1, background: "#E5DDD0", margin: "10px 0" }} />
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 13, color: "#1A1814", letterSpacing: 1.5 }}>
                        📱 PUSH NOTIFICATIONS
                      </div>
                      <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: "#A8A092", marginTop: 2 }}>
                        System notifications even when app is closed
                      </div>
                    </div>
                    <Toggle on={browserNotify} onChange={() => browserNotify ? setBrowserNotify(false) : requestBrowserPermission()} />
                  </div>
                </div>

                {/* FOLLOWED PLAYERS LIST */}
                {followedPlayers.length === 0 ? (
                  <div style={{
                    background: "#FFFFFF", border: "1px dashed #E5DDD0", borderRadius: 12,
                    padding: 24, textAlign: "center",
                  }}>
                    <div style={{ fontSize: 36, marginBottom: 8 }}>⚽</div>
                    <div style={{ fontFamily: "'Anton', sans-serif", fontSize: 15, color: "#1A1814", letterSpacing: 1.5, marginBottom: 6 }}>
                      NO PLAYERS YET
                    </div>
                    <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#A8A092", lineHeight: 1.6 }}>
                      Open the <strong style={{ color: "#1A1814" }}>TEAMS</strong> tab, pick a country, then tap any player in the squad to follow them and get goal alerts.
                    </div>
                  </div>
                ) : (
                  followedPlayers.map(p => {
                    const playerEvents = events.filter(e => e.home.id === p.teamId || e.away.id === p.teamId);
                    return (
                      <PlayerRow key={p.id} player={{
                        ...p, fullName: p.name,
                        position: { abbreviation: p.position },
                      }} events={playerEvents} isFollowing={true} onTap={() => setOpenPlayer(p)} />
                    );
                  })
                )}
              </>
            )}
          </>
        )}
      </div>

      {/* BOTTOM TAB BAR */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0,
        background: "rgba(255,255,255,0.95)", backdropFilter: "blur(20px)",
        borderTop: "1px solid #E5DDD0",
        display: "flex", justifyContent: "space-around",
        padding: "10px 0 14px", zIndex: 50,
      }}>
        {[
          { id: "now", label: "NOW", icon: "●" },
          { id: "fixtures", label: "MATCHES", icon: "▦" },
          { id: "groups", label: "GROUPS", icon: "▢" },
          { id: "teams", label: "TEAMS", icon: "✦" },
          { id: "players", label: "PLAYERS", icon: "★" },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, background: "transparent", border: "none",
            padding: "6px 0", cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
          }}>
            <span style={{ fontSize: 16, color: tab === t.id ? "#DC2626" : "#A8A092" }}>{t.icon}</span>
            <span style={{
              fontFamily: "'Anton', sans-serif", fontSize: 9, letterSpacing: 1.2,
              color: tab === t.id ? "#1A1814" : "#A8A092",
            }}>{t.label}</span>
          </button>
        ))}
      </div>

      {openMatch && (
        <MatchModal event={openMatch} allEvents={events}
          onClose={() => setOpenMatch(null)}
          followedPlayers={followedPlayers}
          onTapPlayer={setOpenPlayer} />
      )}
      {openTeam && (
        <TeamModal team={openTeam} events={events} favorite={favorite}
          onSetFavorite={(t) => { setFavorite(t); setOpenTeam(null); }}
          onTapMatch={setOpenMatch}
          onTapPlayer={(p) => { setOpenTeam(null); setTimeout(() => setOpenPlayer(p), 50); }}
          followedPlayers={followedPlayers}
          onClose={() => setOpenTeam(null)} />
      )}
      {openPlayer && (
        <PlayerModal player={openPlayer} events={events}
          followedPlayers={followedPlayers}
          alertsEnabled={alertsEnabled}
          onFollow={togglePlayer}
          onClose={() => setOpenPlayer(null)} />
      )}
    </div>
  );
}

function Toggle({ on, onChange }) {
  return (
    <button onClick={onChange} style={{
      width: 44, height: 24, borderRadius: 12,
      background: on ? "#DC2626" : "#E5DDD0",
      border: "none", cursor: "pointer", padding: 0, position: "relative",
      transition: "background 0.2s",
    }}>
      <div style={{
        position: "absolute", top: 2, left: on ? 22 : 2,
        width: 20, height: 20, borderRadius: "50%", background: "#1A1814",
        transition: "left 0.2s", boxShadow: "0 2px 4px rgba(0,0,0,0.3)",
      }} />
    </button>
  );
}

const bootEl = document.getElementById("boot");
if (bootEl) bootEl.classList.add("hidden");
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<WorldCupTracker />);
  </script>
</body>
</html>
